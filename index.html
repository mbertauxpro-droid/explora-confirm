<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Compte activé · Explora</title>
  <style>
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FAF7F2;
      color: #1A1A2E;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
    }
    .card {
      max-width: 440px;
      width: 100%;
      background: #fff;
      border: 1px solid rgba(232,69,10,.15);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.06);
    }
    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #E8450A;
      margin-bottom: 32px;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: rgba(232,69,10,.1);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #555;
      margin-bottom: 8px;
    }
    .hint {
      font-size: 13px;
      color: #888;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #eee;
    }
    .hint strong {
      color: #1A1A2E;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">EXPLORA</div>
    <div class="icon">✓</div>
    <h1>Ton compte est activé.</h1>
    <p>Tu peux maintenant retourner dans l'application Explora et te connecter avec ton email et ton mot de passe.</p>
    <div class="hint">
      <strong>Prochaine étape :</strong> ouvre l'app Explora sur ton téléphone et connecte-toi.
    </div>
  </div>
</body>
</html>
